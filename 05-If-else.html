<!DOCTYPE html>
<html>
  <head>
    <h4>EXERCISE</h4>
    <title>IF ELSE</title>
  </head>
  <body>
    
    <button onclick ="
      if(cartQuantity < 10){
      console.log(`Cart quantity: ${cartQuantity}`);
      }else{
        alert(`The cart is full`);
      }
      ">Quantity</button>
    <button onclick ="
      cartQuantity += 1;
      if(cartQuantity <= 10){
      console.log(`Cart quantity: ${cartQuantity}`);
      }else{
        alert(`The cart is full`);
      }
      ">Add to Cart</button>
    <button onclick ="
      cartQuantity += 2;
      if(cartQuantity <= 10){
      console.log(`Cart quantity: ${cartQuantity}`);
      }else{
        alert(`The cart is full`);
      }
      ">+2</button>
    <button onclick ="
      cartQuantity += 3;
      if(cartQuantity <= 10){
      console.log(`Cart quantity: ${cartQuantity}`);
      }else{
        alert(`The cart is full`);
      }
      ">+3</button>
    <button onclick ="
      cartQuantity = 0;
      console.log(`Cart quantity: ${cartQuantity}`);
      ">Reset Cart</button>
      



    <button onclick ="
      cartQuantity -= 1;
      if(cartQuantity >= 0){
      console.log(`Cart quantity: ${cartQuantity}`);
      }else{
        alert(`Not enough items in the cart`);
      }
      ">Remove from Cart</button>
    <button onclick ="
      cartQuantity -= 2;
      if(cartQuantity >= 0){
      console.log(`Cart quantity: ${cartQuantity}`);
      }else{
        alert(`Not enough items in the cart`);
      }
      ">-2</button>
    <button onclick ="
      cartQuantity -= 3;
      if(cartQuantity >= 0){
      console.log(`Cart quantity: ${cartQuantity}`);
      }else{
        alert(`Not enough items in the cart`);
      }
      ">-3</button>

    <script>
      let cartQuantity = 0;
    </script>
  </body>


</html>
